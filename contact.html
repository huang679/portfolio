  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">

<body>

<nav>
  <div class="nav-inner">
    <span class="logo">AR</span>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="projects.html">Projects</a></li>

    </ul>

<main>
  <h1>Contact</h1>
  <p style="margin-bottom:36px;">
    Have a question or want to work together? Send me a message.
  </p>

  <div class="contact-layout">
    <form action="#" method="post">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Your name">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" required placeholder="What's this about?">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="Tell me about your project or idea..."></textarea>
      </div>

      <button type="submit">Send Message</button>
    </form>

    <aside class="contact-info">
      <h3>Get in Touch</h3>
      <p>Prefer to reach out directly? Here's where to find me.</p>

      <div class="contact-detail">
        <span class="contact-label">Email</span>
        <a href="mailto:alex@example.com">alex@example.com</a>
      </div>

      <div class="contact-detail">
        <span class="contact-label">Social</span>
        <div class="social-links">
          <a href="#" class="social-link">Instagram</a>
          <a href="#" class="social-link">LinkedIn</a>
        </div>
      </div>
    </aside>
  </div>
</main>

<footer>

</footer>

</body>
</html>
